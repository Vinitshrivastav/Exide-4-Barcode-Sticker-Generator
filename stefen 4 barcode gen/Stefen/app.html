<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Stefen Battery</title>
<style>
:root{
  --bg:#0b0c10;--panel:#13151c;--card:#1a1d28;--border:#252836;
  --accent:#29d9f0;--green:#22d3a0;--blue:#4a90e8;
  --text:#dde1f0;--muted:#606480;--danger:#f04a5e;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.hdr{background:var(--panel);border-bottom:3px solid var(--accent);padding:12px 22px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:9}
.hdr-icon{font-size:1.2rem;letter-spacing:-3px;color:var(--accent);font-family:monospace}
.hdr-title{font-size:1.45rem;font-weight:800;letter-spacing:3px;color:var(--accent);line-height:1}
.hdr-sub{font-size:.66rem;color:var(--muted);text-transform:uppercase;letter-spacing:2px;margin-top:2px}
.hdr-right{margin-left:auto;display:flex;gap:8px;align-items:center}
.chip{font-size:.72rem;font-weight:700;padding:4px 11px;border-radius:20px}
.chip-g{background:rgba(34,211,160,.15);color:var(--green);border:1px solid var(--green)}
.chip-d{background:var(--card);color:var(--muted);border:1px solid var(--border)}
.notice{background:rgba(240,180,41,.08);border:1px solid rgba(240,180,41,.3);border-radius:10px;padding:12px 16px;font-size:.82rem;color:#f0c060;line-height:1.65}
.notice strong{color:var(--accent);display:block;margin-bottom:3px;font-size:.88rem}
.main{max-width:760px;margin:0 auto;padding:22px 16px 60px;display:flex;flex-direction:column;gap:16px}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px}
.clabel{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:3px;color:var(--muted);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.clabel::before{content:'';display:block;width:3px;height:13px;background:var(--accent);border-radius:2px}
.setup-row{display:flex;gap:10px;align-items:stretch}
#startInput{flex:1;background:var(--panel);border:2px solid var(--border);border-radius:10px;color:var(--text);font-family:monospace;font-size:2rem;padding:10px 15px;outline:none;letter-spacing:4px;transition:border-color .2s;min-width:0}
#startInput:focus{border-color:var(--accent);box-shadow:0 0 0 4px rgba(240,180,41,.12)}
#startInput::placeholder{color:var(--muted)}
#startInput::-webkit-outer-spin-button,#startInput::-webkit-inner-spin-button{-webkit-appearance:none}
#startInput[type=number]{-moz-appearance:textfield}
.btn-set{background:var(--accent);color:#000;border:none;border-radius:10px;font-family:Arial,sans-serif;font-size:1.05rem;font-weight:800;letter-spacing:1px;padding:0 22px;cursor:pointer;white-space:nowrap;transition:background .15s}
.btn-set:hover{background:#11e41f}
.hint{margin-top:9px;font-size:.79rem;color:var(--muted);line-height:1.5}
.active-row{display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.idb{display:flex;flex-direction:column;gap:3px;min-width:70px}
.idb-lbl{font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--muted)}
.idb-val{font-family:monospace;font-size:1.75rem;color:var(--accent);letter-spacing:3px;line-height:1}
.idb-val.blue{color:var(--blue);font-size:1.3rem}
.idb-val.grn{color:var(--green);font-size:1.3rem}
.btn-print{margin-left:auto;background:linear-gradient(135deg,var(--accent),#e05c1a);color:#fff;border:none;border-radius:12px;font-family:Arial,sans-serif;font-size:1.15rem;font-weight:800;letter-spacing:1px;padding:14px 28px;cursor:pointer;display:flex;align-items:center;gap:8px;white-space:nowrap;box-shadow:0 4px 20px rgba(240,180,41,.25);transition:transform .15s,box-shadow .15s}
.btn-print:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(240,180,41,.4)}
.btn-print:active{transform:scale(.97)}
.act-btns{margin-top:12px;padding-top:12px;border-top:1px solid var(--border);display:flex;gap:8px}
.btn-ghost{background:transparent;border:1px solid var(--border);border-radius:8px;color:var(--muted);font-family:Arial,sans-serif;font-size:.88rem;font-weight:700;padding:7px 14px;cursor:pointer;transition:border-color .2s,color .2s}
.btn-ghost:hover{border-color:var(--text);color:var(--text)}
.btn-ghost.danger:hover{border-color:var(--danger);color:var(--danger)}
.slbl{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:3px;color:var(--muted);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.slbl::before{content:'';display:block;width:3px;height:13px;background:var(--green);border-radius:2px}
.sg{display:flex;gap:14px;flex-wrap:wrap}
.stk{background:#fff;border-radius:6px;width:300px;height:120px;box-shadow:0 2px 14px rgba(0,0,0,.45);flex-shrink:0;overflow:hidden}
.stk img{width:100%;height:100%;object-fit:fill;display:block}
.empty{display:flex;flex-direction:column;align-items:center;gap:16px;padding:48px 20px;border:2px dashed var(--border);border-radius:12px}
.ebars{display:flex;align-items:flex-end;gap:4px;height:44px}
.ebars span{display:block;width:5px;background:var(--border);border-radius:2px;animation:pb 1.6s ease-in-out infinite}
.ebars span:nth-child(1){height:30%}.ebars span:nth-child(2){height:80%;animation-delay:.1s}
.ebars span:nth-child(3){height:50%;animation-delay:.2s}.ebars span:nth-child(4){height:100%}
.ebars span:nth-child(5){height:45%;animation-delay:.15s}.ebars span:nth-child(6){height:90%;animation-delay:.05s}
.ebars span:nth-child(7){height:60%;animation-delay:.25s}.ebars span:nth-child(8){height:35%;animation-delay:.1s}
@keyframes pb{0%,100%{opacity:.2}50%{opacity:.6}}
.empty-msg{font-size:.85rem;color:var(--muted);text-align:center}
.htags{display:flex;flex-wrap:wrap;gap:8px}
.htag{font-family:monospace;font-size:.85rem;background:var(--panel);border:1px solid var(--border);border-radius:6px;padding:4px 12px;color:var(--muted);letter-spacing:2px}
.htag.lat{background:rgba(240,180,41,.1);border-color:var(--accent);color:var(--accent)}
.toast{position:fixed;bottom:20px;right:20px;background:var(--green);color:#000;font-family:Arial,sans-serif;font-size:1rem;font-weight:700;padding:12px 18px;border-radius:10px;box-shadow:0 4px 20px rgba(34,211,160,.35);opacity:0;transform:translateY(14px) scale(.95);transition:all .3s cubic-bezier(.34,1.56,.64,1);pointer-events:none;z-index:999}
.toast.show{opacity:1;transform:translateY(0) scale(1)}
.toast.warn{background:var(--danger)}
@media(max-width:500px){
  .setup-row{flex-direction:column}.btn-set{padding:12px}
  .active-row{gap:10px}.btn-print{margin-left:0;width:100%;justify-content:center}
  .stk{width:100%;height:auto;aspect-ratio:5/2}
}
</style>
</head>
<body>
<div class="app">
  <header class="hdr">
    <div class="hdr-icon">▌▌▌▌</div>
    <div>
      <div class="hdr-title">STEFEN BATTERY</div>
    </div>
    <div class="hdr-right" id="hdRight" style="display:none">
      <span class="chip chip-g">● Active</span>
      <span class="chip chip-d" id="hdSets">0 Sets</span>
    </div>
  </header>

  <main class="main">
    

    <section class="card" id="setupCard">
      <div class="clabel">Battery Number — Starting ID</div>
      <div class="setup-row">
        <input type="number" id="startInput" placeholder="11056" min="1" max="9999999" autofocus/>
        <button class="btn-set" onclick="startSession()">SET &amp; START ▶</button>
      </div>
      <p class="hint"></p>
    </section>

    <section class="card" id="activeCard" style="display:none">
      <div class="active-row">
        <div class="idb"><div class="idb-lbl">Current ID</div><div class="idb-val" id="curId">—</div></div>
        <div class="idb"><div class="idb-lbl">Next ID</div><div class="idb-val blue" id="nxtId">—</div></div>
        <div class="idb"><div class="idb-lbl">Sets Done</div><div class="idb-val grn" id="setsId">0</div></div>
        <button class="btn-print" onclick="doPrint()">🖨 PRINT 4 LABELS</button>
      </div>
      <div class="act-btns">
        <button class="btn-ghost" onclick="changeId()">✎ Change ID</button>
        <button class="btn-ghost danger" onclick="resetAll()">↺ Reset</button>
      </div>
    </section>

    <section id="prevSec" style="display:none">
      <div class="slbl">Preview — 4 Labels (50×20mm)</div>
      <div class="sg" id="sGrid"></div>
    </section>

    <section class="empty" id="empState">
      <div class="ebars"><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div>
      <div class="empty-msg">Enter ID Number </div>
    </section>

    <section class="card" id="histCard" style="display:none">
      <div class="clabel">Print History</div>
      <div class="htags" id="histList"></div>
    </section>
  </main>
</div>

<div class="toast" id="toast"></div>
<canvas id="offCanvas" style="position:fixed;left:-9999px;top:0;visibility:hidden"></canvas>

<script>

const C128=[
  '212222','222122','222221','121223','121322','131222','122213','122312','132212','221213',
  '221312','231212','112232','122132','122231','113222','123122','123221','223211','221132',
  '221231','213212','223112','312131','311222','321122','321221','312212','322112','322211',
  '212123','212321','232121','111323','131123','131321','112313','132113','132311','211313',
  '231113','231311','112133','112331','132131','113123','113321','133121','313121','211331',
  '231131','213113','213311','213131','311123','311321','331121','312113','312311','332111',
  '314111','221411','431111','111224','111422','121124','121421','141122','141221','112214',
  '112412','122114','122411','142112','142211','241211','221114','413111','241112','134111',
  '111242','121142','121241','114212','124112','124211','411212','421112','421211','212141',
  '214121','412121','111143','111341','131141','114113','114311','411113','411311','113141',
  '114131','311141','411131','211412','211214','211232'
];
const STOP_W=[2,3,3,1,1,1,2];

function encode128B(text){
  const vals=[104];
  for(let i=0;i<text.length;i++) vals.push(text.charCodeAt(i)-32);
  let chk=104;
  for(let i=0;i<text.length;i++) chk+=(i+1)*(text.charCodeAt(i)-32);
  vals.push(chk%103);
  let bits=[];
  for(let q=0;q<10;q++) bits.push(0);
  for(const v of vals){
    const w=C128[v];
    for(let i=0;i<w.length;i++)
      for(let j=0;j<parseInt(w[i]);j++) bits.push((i%2===0)?1:0);
  }
  for(let i=0;i<STOP_W.length;i++)
    for(let j=0;j<STOP_W[i];j++) bits.push((i%2===0)?1:0);
  for(let q=0;q<10;q++) bits.push(0);
  return bits;
}


function buildLabel(text, pxPerMm){
  const W   = Math.round(50 * pxPerMm);
  const H   = Math.round(20 * pxPerMm);
  const R   = Math.round(2.5 * pxPerMm);
  const PAD = Math.round(1.4 * pxPerMm);

  // Logo column width: 20% of label
  const LOGO_COL = Math.round(10 * pxPerMm); // 10mm wide

  const cv  = document.getElementById('offCanvas');
  cv.width  = W;
  cv.height = H;
  const ctx = cv.getContext('2d');
  ctx.clearRect(0,0,W,H);

  /* ── rounded rect helper ── */
  function rrect(x,y,w,h,r){
    ctx.beginPath();
    ctx.moveTo(x+r,y);
    ctx.lineTo(x+w-r,y); ctx.arcTo(x+w,y,x+w,y+r,r);
    ctx.lineTo(x+w,y+h-r); ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
    ctx.lineTo(x+r,y+h); ctx.arcTo(x,y+h,x,y+h-r,r);
    ctx.lineTo(x,y+r); ctx.arcTo(x,y,x+r,y,r);
    ctx.closePath();
  }

  /* ── white background ── */
  ctx.fillStyle='#ffffff';
  rrect(0,0,W,H,R);
  ctx.fill();

  /* Clip all drawing to rounded rect */
  ctx.save();
  rrect(0,0,W,H,R);
  ctx.clip();

  /* ── RIGHT: Logo column (white bg, logo image centered) ── */
  const logoX = W - LOGO_COL;
  // Thin separator line
  ctx.fillStyle='#e0e0e0';
  ctx.fillRect(logoX - Math.round(0.3*pxPerMm), 0, Math.round(0.3*pxPerMm), H);

  // Draw logo image (just the circle part — we crop square centered)
  const logoImg = document.getElementById('logoImg');
  const logoPad = Math.round(0.8*pxPerMm);
  const logoSize = LOGO_COL - logoPad*2;
  const logoDrawX = logoX + logoPad;
  // Logo PNG has black bg — source image is square 1080×1080
  // The circle occupies roughly top 75% of image (circle + text below)
  // We want ONLY the circle, so source crop: 0,0,1080,810 (top 75%)
  const SRC_W = logoImg.naturalWidth  || 1080;
  const SRC_H = logoImg.naturalHeight || 1080;
  // Crop: circle starts at ~5% and ends at ~95% width, 0 to ~72% height
  const cropX = Math.round(SRC_W * 0.05);
  const cropY = Math.round(SRC_H * 0.04);
  const cropW = Math.round(SRC_W * 0.90);
  const cropH = Math.round(SRC_H * 0.72);
  const logoDrawY = (H - logoSize)/2;

  ctx.drawImage(logoImg, cropX, cropY, cropW, cropH,
                logoDrawX, logoDrawY, logoSize, logoSize);

  /* ── LEFT section ── */
  const leftW = logoX - Math.round(0.3*pxPerMm);

  /* ROW 1: "BATTERY NUMBER" label */
  const row1H = Math.round(4.5*pxPerMm);
  ctx.fillStyle='#f5f5f5';
  ctx.fillRect(0,0,leftW,row1H);

  const lblSize = Math.round(2.0*pxPerMm);
  ctx.fillStyle='#111';
  ctx.font=`700 ${lblSize}px Arial,sans-serif`;
  ctx.textBaseline='middle';
  ctx.textAlign='left';
  ctx.fillText('BATTERY NUMBER', PAD, row1H/2);

  /* Separator */
  ctx.fillStyle='#d0d0d0';
  ctx.fillRect(0, row1H, leftW, Math.round(0.3*pxPerMm));

  /* ROW 2: Barcode */
  const bcTop  = row1H + Math.round(0.8*pxPerMm);
  const bcH    = Math.round(8.5*pxPerMm);
  const bits   = encode128B(String(text));
  const bcAvailW = leftW - PAD*2;
  const mw     = bcAvailW / bits.length;

  ctx.fillStyle='#000';
  for(let i=0;i<bits.length;i++){
    if(bits[i]){
      const x = PAD + i*mw;
      ctx.fillRect(x, bcTop, Math.ceil(mw)+0.5, bcH);
    }
  }

  /* ROW 3: Number */
  const numTop  = bcTop + bcH + Math.round(0.6*pxPerMm);
  const numSize = Math.round(2.6*pxPerMm);
  ctx.fillStyle='#000';
  ctx.font=`bold ${numSize}px 'Courier New',Courier,monospace`;
  ctx.textAlign='center';
  ctx.textBaseline='top';
  ctx.fillText(String(text).split('').join('  '), leftW/2, numTop);

  ctx.restore();

  /* ── Border (rounded) ── */
  ctx.strokeStyle='#bbb';
  ctx.lineWidth=Math.max(1, Math.round(0.3*pxPerMm));
  rrect(ctx.lineWidth/2, ctx.lineWidth/2, W-ctx.lineWidth, H-ctx.lineWidth, R);
  ctx.stroke();

  return cv.toDataURL('image/png');
}

let curId=null, printCount=0, history=[], toastTmr=null;

function syncUI(){
  $('curId').textContent=String(curId);
  $('nxtId').textContent=String(curId+1);
  $('setsId').textContent=String(printCount);
  $('hdSets').textContent=printCount+(printCount===1?' Set':' Sets');

function startSession(){
  const v=parseInt($('startInput').value,10);
  if(!v||v<1){showToast('⚠ Enter ID!',true);$('startInput').focus();return;}
  curId=v; printCount=0;
  $('setupCard').style.display='none';
  $('activeCard').style.display='block';
  $('empState').style.display='none';
  $('hdRight').style.display='flex';
  syncUI();
  showToast('✔ Session Started! ID: '+curId);
}
function changeId(){
  $('setupCard').style.display='block';
  $('activeCard').style.display='none';
  $('startInput').value=curId;
  $('startInput').focus(); $('startInput').select();
}
function resetAll(){
  if(printCount>0&&!confirm('Reset karo? Sab clear ho jayega.'))return;
  curId=null; printCount=0; history=[];
  $('setupCard').style.display='block';
  $('activeCard').style.display='none';
  $('prevSec').style.display='none';
  $('empState').style.display='flex';
  $('histCard').style.display='none';
  $('hdRight').style.display='none';
  $('sGrid').innerHTML=''; $('histList').innerHTML='';
  $('startInput').value=''; $('startInput').focus();
  showToast('↺ Reset complete');
}

function doPrint(){
  if(curId===null){showToast('⚠ Pehle ID set karo!',true);return;}
  const id=curId;

  // Wait for logo to load
  const logoImg=$('logoImg');
  const doGenerate=()=>{
    const prevURL  = buildLabel(String(id), 4.5);
    const printURL = buildLabel(String(id), 8.0);

    const grid=$('sGrid'); grid.innerHTML='';
    $('prevSec').style.display='block';
    for(let i=0;i<4;i++){
      const w=document.createElement('div'); w.className='stk';
      const img=document.createElement('img'); img.src=prevURL; img.alt='label';
      img.style.cssText='width:100%;height:100%;display:block;';
      w.appendChild(img); grid.appendChild(w);
    }

    const pw=window.open('','_blank','width=640,height=480');
    if(!pw){showToast('⚠ Pop-up blocked! Browser mein allow karo.',true);return;}

    pw.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8">
<title> </title>
<style>
  @page{size:50mm 20mm;margin:0}
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{background:#fff;width:50mm;height:20mm}
  .lbl{width:50mm;height:20mm;display:flex;align-items:center;justify-content:center;page-break-after:always;background:#fff}
  .lbl:last-child{page-break-after:avoid}
  .lbl img{width:50mm;height:20mm;display:block;image-rendering:pixelated;image-rendering:crisp-edges}
</style>
</head><body>
<div class="lbl"><img src="${printURL}"/></div>
<div class="lbl"><img src="${printURL}"/></div>
<div class="lbl"><img src="${printURL}"/></div>
<div class="lbl"><img src="${printURL}"/></div>
<script>window.onload=function(){setTimeout(function(){window.print();},500);}<\/script>
</body></html>`);
    pw.document.close();

    printCount++;
    history.unshift(id);
    if(history.length>20) history.pop();
    curId++;
    syncUI(); updateHistory();
    showToast('✔ '+id +'');
  };

  if(logoImg.complete && logoImg.naturalWidth>0){
    doGenerate();
  } else {
    logoImg.onload=doGenerate;
  }
}

function updateHistory(){
  $('histCard').style.display='block';
  const hl=$('histList'); hl.innerHTML='';
  history.forEach((v,i)=>{
    const t=document.createElement('span');
    t.className='htag'+(i===0?' lat':'');
    t.textContent=String(v);
    hl.appendChild(t);
  });
}
function showToast(msg,warn=false){
  const t=$('toast'); t.textContent=msg;
  t.className='toast show'+(warn?' warn':'');
  clearTimeout(toastTmr);
  toastTmr=setTimeout(()=>{ t.className='toast'; },3000);
}
document.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&document.activeElement===$('startInput')){startSession();return;}
  if(e.key==='p'&&curId!==null&&document.activeElement!==$('startInput')){e.preventDefault();doPrint();}
});
</script>
</body>
</html>
